[project]
name = "fugacio-copilot"
version = "0.0.1"
description = "Chemical-engineering design copilot/agent for the Fugacio stack."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Owen Carey", email = "37121709+owenthcarey@users.noreply.github.com" },
]
keywords = [
    "llm",
    "agent",
    "chemical-engineering",
    "process-design",
    "copilot",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Chemistry",
]
dependencies = [
    "fugacio-sim",
]

[project.optional-dependencies]
# Add your LLM SDK(s)/agent framework here, e.g. "anthropic" or "openai".
llm = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fugacio"]

[tool.uv.sources]
fugacio-sim = { workspace = true }
