[project]
name = "fugacio-sim"
version = "0.0.1"
description = "Differentiable steady-state and dynamic process flowsheet simulator (Fugacio)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Owen Carey", email = "37121709+owenthcarey@users.noreply.github.com" },
]
keywords = [
    "process-simulation",
    "flowsheet",
    "chemical-engineering",
    "jax",
    "vapor-liquid-equilibrium",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Chemistry",
]
dependencies = [
    "fugacio-thermo",
    "jax>=0.4.34",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fugacio"]

[tool.uv.sources]
fugacio-thermo = { workspace = true }
