name: Publish

# Publishes each workspace package to PyPI via Trusted Publishing (OIDC) on a
# GitHub Release. Configure a PyPI "trusted publisher" for each project first:
# https://docs.pypi.org/trusted-publishers/  (no API tokens required).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [fugacio-thermo, fugacio-sim, fugacio-copilot]
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }}

      - name: Publish ${{ matrix.package }}
        run: uv publish --trusted-publishing always
