name: Release

# Lockstep release for the whole workspace. On a push to main, Python Semantic
# Release reads the conventional-commit history, computes one shared next
# version, stamps it into all four packages (see [tool.semantic_release] in
# pyproject.toml), writes CHANGELOG.md, commits, tags `vX.Y.Z`, and creates the
# GitHub Release. If (and only if) a release was made, the deploy job builds and
# publishes each package to PyPI via Trusted Publishing (OIDC, no API tokens).
#
# PyPI setup: configure a Trusted Publisher for each of fugacio-thermo,
# fugacio-sim, fugacio-copilot, and the fugacio umbrella pointing at this repo,
# workflow `release.yml`, environment `pypi`. See
# https://docs.pypi.org/trusted-publishers/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag and create the GitHub Release
      id-token: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determines the next version, stamps every package, runs build_command
      # (pins intra-workspace deps to the new version and refreshes uv.lock; see
      # [tool.semantic_release] in pyproject.toml), updates the changelog,
      # commits (including uv.lock), tags, and creates the GitHub Release. The
      # per-package PyPI build/publish runs in the deploy job below.
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Publish ${{ matrix.package }}
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      # Each package has its own PyPI project and Trusted Publisher, so build
      # and publish them independently. Order doesn't matter for PyPI: it
      # doesn't verify dependencies at upload, so the fugacio umbrella (which
      # pins the other three) can publish in any order alongside them.
      matrix:
        package: [fugacio-thermo, fugacio-sim, fugacio-copilot, fugacio]
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      # Check out the tag Semantic Release just created so we build the bumped
      # version, not the commit that triggered the workflow.
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }}

      - name: Publish ${{ matrix.package }}
        run: uv publish --trusted-publishing always
